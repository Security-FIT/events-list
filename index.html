<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Conference Deadlines</title>
    <meta name="color-scheme" content="light" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="headerBox header__inner">
        <!-- Emoji-only theme toggle (top-right) -->
        <label class="themeEmojiBtn" aria-label="Toggle dark mode">
          <input id="darkMode" class="themeEmojiBtn__input" type="checkbox" />
          <span class="themeEmojiBtn__icon" aria-hidden="true">
            <span class="themeEmojiBtn__emoji themeEmojiBtn__emoji--light">☀️</span>
            <span class="themeEmojiBtn__emoji themeEmojiBtn__emoji--dark">🌙</span>
          </span>
        </label>
        <div class="header__left">
          <h1 class="title">Conference Deadlines</h1>
          <p class="subtitle">
            Deadlines are interpreted in <span class="mono">Anywhere-on-Earth</span> (AoE, UTC−12). Times shown are AoE.
          </p>
        </div>
        <div class="header__right">
          <div class="controls">
            <div class="control control--inline">
            <!-- past deadlines toggle lives inline in the past-deadlines section -->
            </div>
            <div class="control control--inline">
            <!-- filters moved under search -->
            </div>
            <div class="control control--inline">
              <!-- theme toggle moved to emoji button in header top-right -->
            </div>
          </div>
        </div>
        </div>
      </div>
    </header>

    <section class="container searchSection" aria-label="Search conferences">
      <div class="searchSection__inner">
        <label class="control__label" for="searchBox">Search</label>
        <input
          id="searchBox"
          class="input"
          type="search"
          placeholder="Conference name…"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="filterToggle" class="btn btn--ghost" type="button" aria-expanded="false" aria-controls="filtersPanel">
          Filter
        </button>
        <div id="filtersPanel" class="filtersPanel" hidden>
          <div class="control">
            <label class="control__label" for="tagFilter">Tags</label>
            <div id="tagFilter" class="tagFilter" aria-label="Tag filters"></div>
          </div>
          <div class="control control--inline">
            <label class="checkbox">
              <input id="showOnlySelectedTags" type="checkbox" />
              <span>Match all selected tags</span>
            </label>
          </div>
          <div class="control control--inline">
            <label class="checkbox">
              <input id="priorityOnly" type="checkbox" />
              <span>Priority only</span>
            </label>
          </div>
        </div>
      </div>
    </section>

    <main class="main">
      <section class="container viewSwitchSection" aria-label="View switch">
        <div class="viewSwitch" role="tablist" aria-label="Conferences and journals">
          <button id="viewConfs" class="viewSwitch__btn" type="button" role="tab" aria-selected="true">Conferences</button>
          <button id="viewJournals" class="viewSwitch__btn" type="button" role="tab" aria-selected="false">Journals</button>
        </div>
      </section>
      <section class="container columns" role="region" aria-label="Conference lists">
        <div class="column">
          <div class="column__header">
            <div class="column__titleRow">
              <h2 class="column__title">Known submission deadlines</h2>
              <div class="column__sort">
                <label class="control__label" for="sortKnown">Sort</label>
                <select id="sortKnown" class="select">
                  <option value="deadlineAsc">Deadline ↑</option>
                  <option value="deadlineDesc">Deadline ↓</option>
                  <option value="coreAsc">CORE ↑</option>
                  <option value="coreDesc">CORE ↓</option>
                </select>
              </div>
            </div>
            <div class="table table--header" aria-hidden="true">
              <div class="row row--header" data-view="known">
                <div class="cell cell--name">Conference</div>
                <div class="cell cell--deadline">Deadline (AoE)</div>
                <div class="cell cell--tags">Tags</div>
                <div class="cell cell--countdown">Countdown</div>
                <div class="cell cell--note">Note</div>
              </div>
            </div>
          </div>
          <div id="knownList" class="column__body" role="region" aria-label="Known submission deadlines list" tabindex="0"></div>
        </div>

        <div class="column">
          <div class="column__header">
            <div class="column__titleRow">
              <h2 class="column__title">To Be Disclosed</h2>
              <div class="column__sort">
                <label class="control__label" for="sortTbd">Sort</label>
                <select id="sortTbd" class="select">
                  <option value="approxAsc">Approx date ↑</option>
                  <option value="approxDesc">Approx date ↓</option>
                  <option value="coreAsc">CORE ↑</option>
                  <option value="coreDesc">CORE ↓</option>
                </select>
              </div>
            </div>
            <div class="table table--header" aria-hidden="true">
              <div class="row row--header" data-view="tbd">
                <div class="cell cell--name">Conference</div>
                <div class="cell cell--deadline">Deadline (AoE)</div>
                <div class="cell cell--tags">Tags</div>
                <div class="cell cell--note">Note</div>
              </div>
            </div>
          </div>
          <div id="tbdList" class="column__body" role="region" aria-label="TBD submission deadlines list" tabindex="0"></div>
        </div>
      </section>

      <section id="journalsView" class="container journalsView" role="region" aria-label="Journal list" hidden>
        <div class="column journalsColumn">
          <div class="column__header">
            <div class="column__titleRow">
              <h2 class="column__title">Journals</h2>
              <div class="column__sort">
                <label class="control__label" for="sortJournals">Sort</label>
                <select id="sortJournals" class="select">
                  <option value="sjrDesc">SJR ↓</option>
                  <option value="sjrAsc">SJR ↑</option>
                  <option value="nameAsc">Name A→Z</option>
                  <option value="nameDesc">Name Z→A</option>
                </select>
              </div>
            </div>
            <div class="table table--header" aria-hidden="true">
              <div class="row row--header" data-view="journals">
                <div class="cell cell--name">Journal</div>
                <div class="cell cell--tags">Tags</div>
                <div class="cell cell--note">Note</div>
              </div>
            </div>
          </div>
          <div id="journalsList" class="column__body" role="region" aria-label="Journals list" tabindex="0"></div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container footer__inner">
        <div class="footer__left">
          <span id="statusText" class="statusText">Loading…</span>
        </div>
        <div class="footer__right">
          <span class="mono">Config:</span> <a class="link" href="./conferences.json">conferences.json</a>
        </div>
      </div>
    </footer>

    <script defer src="./app.js"></script>
  </body>
</html>
